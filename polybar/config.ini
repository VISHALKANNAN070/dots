[colors]
background = #131818
foreground = #c7ccca

primary = #649BC2
secondary = #6B8FA4
accent = #BB8937

warning = #A96F31
alert = #9A6023
success = #708081

disabled = #8b8e8d
border = #708081

[bar/main]
width = 70%
height = 20
offset-x = 15%
offset-y = 4
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2
padding-left = 1
padding-right = 1
module-margin = 1
override-redirect = false
font-0 = "Lilex Nerd Font Propo:size=10;2"

modules-left = xworkspaces
modules-center = date
modules-right = network cpu memory battery volume

separator = |
separator-foreground = ${colors.accent}
wm-restack = generic
enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.primary}
label-active-foreground = ${colors.background}
label-active-padding = 1

label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/date]
type = internal/date
interval = 1
time = %H:%M
label = %time%
label-foreground = ${colors.accent}

[module/network]
type = custom/script
exec = ~/.config/polybar/scripts/network.sh
interval = 5
label = %output%
label-foreground = ${colors.success}

[module/cpu]
type = internal/cpu
interval = 2
label = CPU %percentage%%
label-foreground = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
label = RAM %mb_used%MB
label-foreground = ${colors.primary}

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 100

label-charging = CHG %percentage%%
label-discharging = BAT %percentage%%
label-full = FULL 100%

label-charging-foreground = ${colors.success}
label-discharging-foreground = ${colors.foreground}
label-full-foreground = ${colors.accent}

[module/volume]
type = internal/pulseaudio
label-volume = VOL %percentage%%
label-volume-foreground = ${colors.primary}

label-muted = MUTED
label-muted-foreground = ${colors.alert}
